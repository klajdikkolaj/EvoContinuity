<svg width="1400" height="1040" viewBox="0 0 1400 1040" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="1040" rx="52" fill="url(#bg)" />
  <rect x="34" y="34" width="1332" height="972" rx="40" stroke="url(#frame)" />

  <circle cx="1194" cy="150" r="150" fill="url(#warmGlow)" />
  <circle cx="194" cy="902" r="194" fill="url(#seaGlow)" />

  <g opacity="0.3">
    <path d="M120 862H1280" stroke="url(#baseline)" stroke-width="2" />
    <path d="M178 198H1220" stroke="url(#topline)" stroke-width="2" stroke-dasharray="10 14" />
  </g>

  <g filter="url(#panelShadow)">
    <rect x="120" y="240" width="248" height="438" rx="30" fill="url(#panelFill)" stroke="url(#panelStroke)" />
    <rect x="410" y="240" width="248" height="438" rx="30" fill="url(#panelFill)" stroke="url(#panelStroke)" />
    <rect x="700" y="240" width="248" height="438" rx="30" fill="url(#panelFill)" stroke="url(#panelStroke)" />
    <rect x="990" y="240" width="290" height="438" rx="30" fill="url(#panelFill)" stroke="url(#warmStroke)" />
    <rect x="334" y="760" width="732" height="140" rx="28" fill="url(#railFill)" stroke="url(#railStroke)" />
  </g>

  <g opacity="0.92">
    <path d="M368 458H410" stroke="url(#arrowA)" stroke-width="4" stroke-linecap="round" />
    <path d="M658 458H700" stroke="url(#arrowA)" stroke-width="4" stroke-linecap="round" />
    <path d="M948 458H990" stroke="url(#arrowB)" stroke-width="4" stroke-linecap="round" />
    <path d="M1134 678V760" stroke="url(#arrowB)" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 14" />
  </g>

  <g opacity="0.9">
    <circle cx="388" cy="458" r="10" fill="#68E6D7" />
    <circle cx="678" cy="458" r="10" fill="#83B9FF" />
    <circle cx="968" cy="458" r="10" fill="#F3BB78" />
    <circle cx="1134" cy="700" r="10" fill="#68E6D7" />
  </g>

  <text x="146" y="196" fill="#68E6D7" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="4">
    HOW THE GOVERNED LOOP WORKS
  </text>

  <text x="150" y="300" fill="#ECF2FF" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700">1</text>
  <text x="150" y="356" fill="#ECF2FF" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">
    Bring something meaningful in
  </text>
  <text x="150" y="404" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="22">
    Memories, dreams, symbols,
  </text>
  <text x="150" y="434" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="22">
    rituals, or bounded signals.
  </text>
  <rect x="150" y="474" width="84" height="34" rx="17" fill="#102142" />
  <rect x="244" y="474" width="80" height="34" rx="17" fill="#102142" />
  <rect x="150" y="522" width="118" height="34" rx="17" fill="#102142" />
  <text x="175" y="497" fill="#8FEBDD" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Memory</text>
  <text x="269" y="497" fill="#83B9FF" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Dream</text>
  <text x="176" y="545" fill="#F3BB78" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Bounded signal</text>

  <text x="440" y="300" fill="#ECF2FF" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700">2</text>
  <text x="440" y="356" fill="#ECF2FF" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">
    Turn it into a proposal
  </text>
  <text x="440" y="404" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="22">
    Interpretation becomes a
  </text>
  <text x="440" y="434" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="22">
    reviewable proposal, not a hidden edit.
  </text>
  <rect x="440" y="486" width="188" height="66" rx="24" fill="url(#proposalFill)" stroke="url(#proposalStroke)" />
  <text x="470" y="528" fill="#061019" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Proposal packet
  </text>

  <text x="730" y="300" fill="#ECF2FF" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700">3</text>
  <text x="730" y="356" fill="#ECF2FF" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">
    Review it through rules
  </text>
  <text x="730" y="404" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="22">
    Consent, identity, safety,
  </text>
  <text x="730" y="434" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="22">
    and role boundaries decide what is allowed.
  </text>
  <rect x="730" y="478" width="92" height="34" rx="17" fill="#102142" />
  <rect x="834" y="478" width="90" height="34" rx="17" fill="#102142" />
  <rect x="730" y="526" width="96" height="34" rx="17" fill="#102142" />
  <text x="757" y="501" fill="#8FEBDD" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Consent</text>
  <text x="861" y="501" fill="#83B9FF" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Identity</text>
  <text x="758" y="549" fill="#F3BB78" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Roles</text>

  <text x="1020" y="300" fill="#ECF2FF" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700">4</text>
  <text x="1020" y="356" fill="#ECF2FF" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">
    Let the world evolve safely
  </text>
  <text x="1020" y="404" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="22">
    Approved change enters one visible loop with
  </text>
  <text x="1020" y="434" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="22">
    checkpoint capture, replay, and rollback.
  </text>
  <circle cx="1134" cy="530" r="56" fill="url(#loopCore)" />
  <circle cx="1134" cy="530" r="92" stroke="url(#loopOrbit)" stroke-width="2" opacity="0.56" />
  <ellipse cx="1134" cy="530" rx="118" ry="82" transform="rotate(-18 1134 530)" stroke="url(#loopOrbitB)" stroke-width="2" opacity="0.3" />

  <text x="376" y="816" fill="#ECF2FF" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">
    Nothing important changes behind your back
  </text>
  <text x="376" y="858" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="22">
    The same visible loop preserves review, checkpoint evidence, replay readiness, and rollback authority.
  </text>

  <defs>
    <linearGradient id="bg" x1="128" y1="86" x2="1238" y2="992" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081120" />
      <stop offset="0.58" stop-color="#091327" />
      <stop offset="1" stop-color="#030711" />
    </linearGradient>
    <linearGradient id="frame" x1="96" y1="70" x2="1310" y2="1006" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.14" />
      <stop offset="0.52" stop-color="#83B9FF" stop-opacity="0.22" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.05" />
    </linearGradient>
    <radialGradient id="warmGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1194 150) rotate(90) scale(150)">
      <stop stop-color="#F3BB78" stop-opacity="0.86" />
      <stop offset="1" stop-color="#F3BB78" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="seaGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(194 902) rotate(90) scale(194)">
      <stop stop-color="#68E6D7" stop-opacity="0.54" />
      <stop offset="1" stop-color="#68E6D7" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="baseline" x1="120" y1="862" x2="1280" y2="862" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17263F" stop-opacity="0" />
      <stop offset="0.5" stop-color="#38547D" stop-opacity="0.5" />
      <stop offset="1" stop-color="#17263F" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="topline" x1="178" y1="198" x2="1220" y2="198" gradientUnits="userSpaceOnUse">
      <stop stop-color="#68E6D7" stop-opacity="0" />
      <stop offset="0.5" stop-color="#68E6D7" stop-opacity="0.28" />
      <stop offset="1" stop-color="#F3BB78" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="panelFill" x1="120" y1="240" x2="1280" y2="678" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1430" stop-opacity="0.94" />
      <stop offset="1" stop-color="#0A1224" stop-opacity="0.96" />
    </linearGradient>
    <linearGradient id="panelStroke" x1="120" y1="240" x2="948" y2="678" gradientUnits="userSpaceOnUse">
      <stop stop-color="#284C77" stop-opacity="0.46" />
      <stop offset="1" stop-color="#68E6D7" stop-opacity="0.16" />
    </linearGradient>
    <linearGradient id="warmStroke" x1="990" y1="240" x2="1280" y2="678" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3BB78" stop-opacity="0.42" />
      <stop offset="1" stop-color="#83B9FF" stop-opacity="0.16" />
    </linearGradient>
    <linearGradient id="railFill" x1="334" y1="760" x2="1066" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1732" stop-opacity="0.94" />
      <stop offset="1" stop-color="#0A1223" stop-opacity="0.94" />
    </linearGradient>
    <linearGradient id="railStroke" x1="334" y1="760" x2="1066" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#284C77" stop-opacity="0.44" />
      <stop offset="1" stop-color="#68E6D7" stop-opacity="0.18" />
    </linearGradient>
    <linearGradient id="arrowA" x1="368" y1="458" x2="700" y2="458" gradientUnits="userSpaceOnUse">
      <stop stop-color="#68E6D7" />
      <stop offset="1" stop-color="#83B9FF" />
    </linearGradient>
    <linearGradient id="arrowB" x1="948" y1="458" x2="1134" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#83B9FF" />
      <stop offset="1" stop-color="#F3BB78" />
    </linearGradient>
    <linearGradient id="proposalFill" x1="440" y1="486" x2="628" y2="552" gradientUnits="userSpaceOnUse">
      <stop stop-color="#68E6D7" />
      <stop offset="1" stop-color="#83B9FF" />
    </linearGradient>
    <linearGradient id="proposalStroke" x1="440" y1="486" x2="628" y2="552" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.4" />
      <stop offset="1" stop-color="#061019" stop-opacity="0.12" />
    </linearGradient>
    <linearGradient id="loopCore" x1="1078" y1="474" x2="1190" y2="586" gradientUnits="userSpaceOnUse">
      <stop stop-color="#68E6D7" />
      <stop offset="1" stop-color="#67A8FF" />
    </linearGradient>
    <linearGradient id="loopOrbit" x1="1042" y1="460" x2="1226" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#68E6D7" />
      <stop offset="1" stop-color="#83B9FF" />
    </linearGradient>
    <linearGradient id="loopOrbitB" x1="1016" y1="448" x2="1252" y2="612" gradientUnits="userSpaceOnUse">
      <stop stop-color="#83B9FF" />
      <stop offset="1" stop-color="#F3BB78" />
    </linearGradient>
    <filter id="panelShadow" x="84" y="212" width="1232" height="730" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.28" />
    </filter>
  </defs>
</svg>
