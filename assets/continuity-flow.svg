      <stop offset="1" stop-color="#F3BB78" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="cardFill" x1="170" y1="248" x2="1230" y2="802" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1430" stop-opacity="0.94" />
