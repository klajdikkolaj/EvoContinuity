    <rect x="170" y="394" width="1060" height="116" rx="30" fill="url(#cardFill)" stroke="url(#cardStroke)" />
    <rect x="170" y="540" width="1060" height="116" rx="30" fill="url(#cardFill)" stroke="url(#cardStroke)" />
    <rect x="170" y="686" width="1060" height="116" rx="30" fill="url(#cardFill)" stroke="url(#cardStrokeWarm)" />
    <rect x="324" y="850" width="742" height="98" rx="28" fill="url(#bandFill)" stroke="url(#bandStroke)" />
  </g>

  <g opacity="0.96">
