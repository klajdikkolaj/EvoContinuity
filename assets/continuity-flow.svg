  </text>
  <text x="676" y="312" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="32">
    memory, dream, ritual
  </text>

  <text x="276" y="458" fill="#ECF2FF" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="700">
