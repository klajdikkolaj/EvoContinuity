  <text x="184" y="324" fill="#061019" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">1</text>
  <text x="184" y="470" fill="#061019" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">2</text>
  <text x="184" y="616" fill="#061019" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">3</text>
  <text x="184" y="762" fill="#061019" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">4</text>

  <text x="276" y="312" fill="#ECF2FF" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="700">
