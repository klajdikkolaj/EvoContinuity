  <text x="150" y="182" fill="#ECF2FF" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Memory zones</text>
  <text x="150" y="226" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="24">Worlds shaped by</text>
  <text x="150" y="258" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="24">meaning and return.</text>

  <text x="1036" y="308" fill="#ECF2FF" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Virgil</text>
  <text x="1036" y="350" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="23">Guide figure under</text>
  <text x="1036" y="380" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="23">bounded rules.</text>

  <text x="494" y="834" fill="#ECF2FF" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Governed continuity</text>
  <text x="494" y="882" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="25">Reviewable. Reversible.</text>
  <text x="494" y="916" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="25">Built for trust over time.</text>

