<svg width="1400" height="1100" viewBox="0 0 1400 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="1100" rx="52" fill="url(#bg)" />
  <rect x="34" y="34" width="1332" height="1032" rx="40" stroke="url(#frame)" />

  <circle cx="1084" cy="192" r="164" fill="url(#warmGlow)" />
  <circle cx="1006" cy="484" r="280" fill="url(#coolGlow)" />
  <circle cx="272" cy="852" r="228" fill="url(#seaGlow)" />

  <g opacity="0.28">
    <path d="M106 854C250 748 410 696 586 696C790 696 980 756 1234 944" stroke="url(#horizon)" stroke-width="2" />
    <path d="M160 784C324 700 468 664 646 664C828 664 994 716 1180 836" stroke="url(#horizonSoft)" stroke-width="2" stroke-dasharray="12 16" />
  </g>

  <g filter="url(#orbShadow)">
    <circle cx="930" cy="470" r="212" fill="url(#orbFill)" />
