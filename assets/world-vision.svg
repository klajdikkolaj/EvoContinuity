  <text x="142" y="182" fill="#ECF2FF" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">
    Memories, dreams, symbols
  </text>
  <text x="142" y="228" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="23">
    Meaning enters the world as
  </text>
  <text x="142" y="258" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="23">
    something to interpret, not obey.
  </text>
  <rect x="142" y="286" width="112" height="34" rx="17" fill="#102142" />
  <rect x="266" y="286" width="100" height="34" rx="17" fill="#102142" />
  <rect x="378" y="286" width="58" height="34" rx="17" fill="#102142" />
  <text x="168" y="309" fill="#8FEBDD" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Memory</text>
  <text x="292" y="309" fill="#8ABEFF" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Dreams</text>
  <text x="396" y="309" fill="#F3BB78" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Ritual</text>

  <text x="178" y="442" fill="#ECF2FF" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">
    Shared rules
  </text>
  <text x="178" y="482" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="22">
    Consent, identity, review,
  </text>
  <text x="178" y="512" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="22">
    and reversibility stay visible.
  </text>

  <text x="1060" y="308" fill="#ECF2FF" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">
    Virgil
  </text>
  <text x="1060" y="346" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="22">
    Guide figure with
  </text>
  <text x="1060" y="376" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="22">
    bounded authority.
  </text>

  <text x="474" y="846" fill="#ECF2FF" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700">
    Return over time
  </text>
  <text x="474" y="894" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="25">
    Meaning becomes place, guidance, and experience
  </text>
  <text x="474" y="928" fill="#AAB8D4" font-family="Arial, Helvetica, sans-serif" font-size="25">
    inside a world you can revisit without losing control.
  </text>

  <text x="820" y="446" fill="#061019" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">
    Eternia world
  </text>
  <text x="788" y="486" fill="#102038" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Proposal review
  </text>
  <text x="798" y="518" fill="#102038" font-family="Arial, Helvetica, sans-serif" font-size="22">
    before world change
  </text>

  <g opacity="0.82">
    <rect x="706" y="116" width="188" height="44" rx="22" fill="#0C1430" stroke="#284C77" />
    <text x="734" y="145" fill="#68E6D7" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" letter-spacing="1.3">
