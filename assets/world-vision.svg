  <path d="M442 462L536 438" stroke="url(#linkCool)" stroke-width="3.5" stroke-linecap="round" />
  <path d="M1032 326L1018 344" stroke="url(#linkWarm)" stroke-width="3.5" stroke-linecap="round" />
  <path d="M720 784L754 548" stroke="url(#linkCool)" stroke-width="3.5" stroke-linecap="round" />

  <g opacity="0.92">
    <circle cx="508" cy="310" r="10" fill="#8FEBDD" />
    <circle cx="702" cy="268" r="10" fill="#8ABEFF" />
    <circle cx="906" cy="248" r="10" fill="#F3BB78" />
    <circle cx="1014" cy="714" r="12" fill="#8FEBDD" />
    <circle cx="766" cy="804" r="10" fill="#8ABEFF" />
